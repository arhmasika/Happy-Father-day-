<!DOCTYPE html><html>
<head>
  <title>Congratulations 🎉</title>  <style>
    body {
      background: linear-gradient(#a18cd1, #fbc2eb);
      text-align: center;
      font-family: Arial;
      color: white;
      padding: 20px;
      overflow: hidden;
    }

    h1 {
      margin-top: 40px;
      font-size: 50px;
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .box {
      background: rgba(255,255,255,0.2);
      padding: 25px;
      border-radius: 20px;
      max-width: 750px;
      margin: auto;
      font-size: 22px;
      line-height: 1.8;
      min-height: 200px;
      white-space: pre-wrap;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .emoji {
      position: absolute;
      font-size: 30px;
      animation: fall 6s linear infinite;
    }

    @keyframes fall {
      0% {transform: translateY(-10%);}
      100% {transform: translateY(110vh);}
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      cursor: pointer;
      background: white;
      color: #6a11cb;
      font-weight: bold;
    }
  </style></head><body><h1>🎉 Congratulations Big Bro 👶💙</h1><div class="box" id="text"></div><button onclick="showMessage()">💌 Show Message</button>

<script>
const message = `Dear Brother,

Congratulations on becoming a father! 👶💙

This is such a beautiful and life-changing moment for you and your family.

I am really proud of you and happy to see you step into this new journey of fatherhood.

May your child grow in good health, wisdom, and happiness.

Wishing you strength, patience, and endless joy as you begin this new chapter.

You will be an amazing dad! 🎉`;

let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

function showMessage() {
  document.getElementById("text").innerHTML = "";
  i = 0;
  typeWriter();
}

// floating emojis
const emojis = ["👶","💙","🎉","✨","🥳"];

for(let i=0;i<35;i++){
  let div = document.createElement("div");
  div.classList.add("emoji");
  div.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
  div.style.left = Math.random()*100 + "vw";
  div.style.animationDuration = (3 + Math.random()*5) + "s";
  document.body.appendChild(div);
}
</script></body>
</html>
